name: .NET 10 Desktop CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    env:
      Project_Path: PrismPane-Widgets.csproj
      DotNet_Version: 10.0.x
      Build_Configuration: Release
      Publish_Output: artifacts/publish

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DotNet_Version }}
        cache: true
        cache-dependency-path: PrismPane-Widgets.csproj

    - name: Restore dependencies
      run: dotnet restore $env:Project_Path

    - name: Build desktop app
      run: dotnet build $env:Project_Path --configuration $env:Build_Configuration --no-restore

    - name: Publish desktop app
      run: dotnet publish $env:Project_Path --configuration $env:Build_Configuration --no-build --output $env:Publish_Output

    - name: Upload published artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PrismPane-Widgets-${{ env.Build_Configuration }}
        path: ${{ env.Publish_Output }}
